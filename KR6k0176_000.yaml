front:
  text: 校勘義鈔序餘杭郡沙門釋元照述此鈔傳世其來久矣或為之訓解或口以傳授但去聖綿遠在人寡薄城中之乳日漸乖真林間之偈相承傳謬故使大慈留訓久掩其風末裔問津莫知所適是以積年沈玩四出搜求欲廣見聞固當詮示輒為序引粗列三科庶使智者觀之所謂思過半矣著撰來意一也駮古異議二也校本差互三也初中夫毗尼為教厥號行詮行之所依存乎事相往古諸德未窮斯旨競述義疏廣引繁詞唯我祖師拔乎衆見刊削搜補顯行世事森列二持統歸三行故事鈔之作最居其首且事則在乎簡要行必憑乎楷模故不廣義章但直舒正範然則聖教宏遠至理淵微或隱伏之深文或廢興之來致無非正說豈患多途學必優柔義須精練是以攬諸要義別録成章斯文之興抑其次矣是知事義兩鈔表裏相資非事鈔則行無所憑失乎教本非義鈔則解無以發昧於來詮詳其題號兩分實乃行解兼舉二部之作旨在于此或云戒業二疏不盡之義收拾成文者嘗用對考而文義多同若其不盡止可拾其所遺豈得彼此重見故知不爾或云為二疏張本者且事鈔所指三部顯然豈是為疏而為草創吾宗學者深須詳鑒果有所疑試引誠證鈔興意云每所引用先加覆檢於一事之下廢立意多諸師所存情見繁廣今竝刪略止存文證此明事鈔下序義鈔云及教通餘論理相難知自非通解焉能究盡廣如集義鈔所顯此引文證也又下明不學無知持犯等義兩鈔猶同及乎二疏始多損益或復廢前其類非一此以義證也又先撰事鈔當武德之末九年次製此鈔乃貞觀之初元年年曆相去足顯同時況貞觀之間始創二疏戒疏八年業疏九年以見昔云拾疏不盡者得非謬哉此約時驗也又法寶律師玄暢批云此鈔國初南山祖師述助釋行事鈔據此所明頗得其實既云助釋則相資之義皎若重輪況指國初而同出之文奄如合契此引古證也釋疑會異委在別論第二駮古異議者通慧僧録贊寧評此鈔有三種定在事鈔前撰一曰文義魯質多云首解二曰著述不全埋名沒代前無序引後無批文三曰備其遺忘略示義章但云將講等古記雖欲救止奈何理寡辭枝況不知疑之所來誠有由矣嘗三復斯語竊所未安故曲辨之俾無後惑原夫此鈔之製蓋集諸師章疏以成文體古賢製作直伸義意不務雕飾今則且依彼本刪要録之及乎二疏始加潤色比諸大部辭理彬彬與此酬校安得無疑又歷代述作僅兩十家他師之義但通標昔解又解等唯首師大疏理趣弘遠為今所宗故獨顯名用簡諸說斯實推寄有本不掩師承況首解之言蓋語從省要亦何質之有而彼輒見指斥一未可也又嘗考古本首後不全章節不次名代不顯誠如所言然亦未可非於作者故今略以數意求之有云草藁才成便為他竊未暇緝綴此昔所通亦一意也又唐室衰末涉于五代天下紛擾釋侶逃散諸宗經訓因之殘缺此二意也又祖教流衍本於關輔江浙相遼過數千里傳文至此訛脫叵知此三意也又撰述至今歲時悠遠或傳寫遺漏或紙素零脫例如歸敬儀文前無半序比於儒宗書禮亡逸尤多況此間見行猶闕下卷可非驗耶此四意也而彼未詳直爾輕貶二未可也又製撰之家非唯一轍今但攢聚義類不立篇目撮略為宗復無附釋但標將講節為大科會諸家之異同以區可不列展轉之難問用闢深疑辭義宛然豈唯備忘三未可也用上諸意駮彼三種以見先德曾未討論傳習之流無踐斯迹第三校本差互復有三別初辨諸本者天台律師允堪科釋之本則為三卷世中見行後得古本止有上中兩卷比三卷者始末皆同固常持疑無處求決近於永嘉得故常寧律師文漙一本四卷即以上中各分為二彼自批云據法寶目録云有三卷今止獲二卷細尋此說復按後批始知東夷寄還元有三卷下卷獨亡不傳江左非本無矣後人不達分中為下且應目録之數豈知失於本趣不於後進耶又審諸部隱略指在義鈔而文多不出良由於此諸師章記輒云指誤撿彼無文等蓋不知所以裁之故言多率爾今從古本止存上中兩卷復慮重大析開為四下卷闕如以俟於後二正名題者此間所見古今多本竝云四分律拾毗尼義鈔而永嘉一本獨云拾毗尼要然雖理趣一貫其如全缺兩殊又事鈔所指復有多別或云集義鈔或單云義鈔皆略舉也或云別鈔非同部也今則從多為正如文所題又按通慧云埋名沒代可驗卷首本無撰號後人添入今亦存之三定品次者自上卷之初至中卷之末總一十六段皆首標將講而無一二次第之目然諸古本於破僧大意之下即列僧殘及二不定又間以時非時然後始列四夷便接捨墮校以篇聚顯然倒亂究其所由莫可知矣昔天台律師降僧殘不定次於四重升時非時綴于破僧雖云改易而文次宛順於理無損今從彼意總列卷首毗尼大綱起戒差別十三難不學無知轉業變根破僧大意時非時四波羅夷十三僧殘二不定三十捨墮九十單提四提舍尼衆學七滅諍四諍
