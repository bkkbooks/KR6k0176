body:
  text: 將講不學無知漸頓略存四門第一以不學無知相對解漸頓者一解不學無知是其止犯於一切法上息心不學是其止即得不學罪亦結無知罪兼犯二罪得有頓義不得犯一切戒此解大難當息不學之時正不學罪由不學故緣法不了始結無知此先後心起不得雙犯何言兼二罪名之為頓又解不學無知先後心起非一時故亦是其漸不得言頓其不學無知文證者律中云五歲不學羯磨不誦戒本得罪者以其行法若不誦持行難成立故遣令學問故今言不誦得罪此亦為難彼乃是汎論化儀法若有罪者後云汝當得四果若不得者亦應有罪何不見懺不得四果之罪又云制者對於可制學問可制四果不可制獨頭煩惱不可制安居自恣可制然就所學之教不過二教二教者何一制二聽故地持云有罪行者制無罪行者聽制有二種一制作作即無愆不順有罪二制止作即有過止即無違言聽教者作與不作皆無罪生此中止持作犯唯對二教中事以明作持止犯通對二教中事法兩種制門中事有二一不可學事如似人作非人想者二者可學事如似衣鉢體量等是聽門中事者唯可學如似房舍尺量長衣廣狹等是法謂造房乞處分等是第二別釋漸頓者不學之罪可有漸頓無知之罪唯漸非頓所以知者如要心於一切可學法上皆作不學之意於一一法上皆得頓犯不學之罪反爾所罪處本受戒時發爾所戒善以防不學之罪今總作不學之心寧不頓犯眾多罪耶云何為漸若要心雖不學經餘者悉學望不學經邊唯犯一罪名之為漸云何無知唯漸非頓然無知之罪要須緣而不了方結其罪一心之中不可備緣諸法便皆了知唯是別緣而犯故制為漸不言頓第三分齊者有三別謂就教對行從根言就教者論其學從始至終悉皆須學不學即結不學罪無知之罪五夏已後方結與前不同言對行者謂有淺深故少解之人實望上不足形下有餘若不制者謂恃少解與高勝齊等故律云五夏智慧比丘應從十夏比丘求依止故言從根者若利根易悟從始至終即結二罪以此人不學故無知非不能知鈍根難悟始終唯結不學無無知罪非此人力分律云愚癡比丘盡形依止故第四解不學無知可懺不可懺者問不學無知可懺以不答一解不學罪可懺無知罪不可懺所以然者不學之罪有斷相續義若要心還學即無不學罪即斷相續故可懺無知之罪雖作心欲知緣而不了猶是無知無斷相續故不可懺若後緣了即是解惑相除復不須懺問若爾發心欲知由未知故相續不斷不得懺者我作心欲學猶未學是不學相續亦不得懺答學據始修進趣為言知論終成了境為義始終不同何得相竝又解若息心不學後時緣而不了結無知罪若作心學一切而力分未知後時緣不了是無知聖不結無知罪如是解者有斷相續不學無知二俱可懺將講轉業變根略存七門第一轉業者經論明轉業今明轉根麤同細別轉根其必轉業轉業未必轉根如善見云此二根中變成男根者最上成女根者最下乃至如是二根以多罪故以多功德故而解云修身戒心慧故轉業變根以是義故惡業不定可斷除故善業不定可增修故善見亦云變作三種二形一能自受胎亦能令他受胎二能自受胎不能令他受胎三不能自受胎能令他受胎此三皆擯五分云若自斷根若惡獸嚼若冤家害若自爛壞若不能男皆須滅擯不如四分第二受戒得不者如十僧欲與沙彌受戒僧忽變尼此人不得戒尼無與男子受戒法故又以法不滿故若事將竟變為尼者沙彌得比丘戒若弟子變為女人臨竟變者得戒前即不得為本法不滿故若十僧與本法人受戒者能所二人互轉得戒進不例前取解若明十尼與式叉作本法論師根變弟子有得戒有不得戒亦準上解論弟子變者勿問法滿不滿一向不成以男子畢竟不假本法故須引十誦文顯如是義故伽論若眾數比丘聞羯磨已轉根得比丘戒比丘尼從比丘乞受戒和尚轉根亦復如是第三能防廢興者別有二種一就戒體廢興二就教廢興今先就體若存多無作解者如僧轉為尼本受得輙教誡尼等以所防無故無此等無作或尼轉為僧洗淨過分等戒亦如是不同修道成羅漢者但以三毒悉盡不造惡業故無作成若比丘轉為尼者以所防獨行事生故能防無作亦隨起尼轉亦爾何以故以本受時總斷一切惡有善法皆修此即是因今轉為緣因緣具足所以還生本無今有又作一無作解者比丘要心有惡當斷容有轉根犯尼戒義故本要心時懸發一切與尼不同戒故僧轉為尼能防受體更無生滅雖僧尼互轉不可以本惡境無故即使能防謝又可以所防惡起即使能防生以無作唯一本要期心足雖過境廢興能防定一問若大僧受時已得尼戒者何以不名為尼答戒體無殊隨根有異未變之時位是男根故名比丘不得名尼問男女互有二戒者何故婆沙云女人身中有男子煖法男子身中無女人煖法者此轉何異解有二一女人懷他男子胎男子煖男子無懷胎義故無胎女煖又解男子轉根作女人雖變女人本男子煖法猶在女身中若女轉為男子者今男子身中無本女入煖何以故男子修煖猛利增上雖成女人本煖猶在女人志弱轉成男子者女時修煖根輭非煖即無問若爾何故上說女變成男功德勝何非上耶答戒是生得善根轉由過去不定業故得今轉若過去業定今無轉義煖是修得若轉習猶在以男子根猛利今成聖多次就教者若所制事同或所制緣異但是犯同如盜殺夷等此教不廢如長衣鉢離衣流類亦爾自有犯同而事相反者如二同室宿犯提流類此教不廢若所禁事同而輕重不同者如弄失摩觸等類辨有無不同皆有廢興第四順行法重作不者懺僧殘是但使不同勿問法足不足行滿不滿隨僧尼互轉清淨更無續作故諸同犯者如婆論云若比丘犯僧殘乃至十年覆藏後變為尼者行十五日法若得六夜法竟未行變為尼到彼更作法以眾有多少別時有長短異故得行六夜竟直與出罪若辨尼變先未得法變為比丘同罪有覆藏者婆論云與覆藏治善見云不治覆藏直與六夜若尼行半月竟變者亦直出罪若尼行半月乃至六夜未竟變者彼更與六夜法若六夜竟變者彼直與出罪十誦云頗有比丘尼犯五種罪不悔不發露不犯耶佛言有轉根是首解五篇是也伽論問頗有比丘尼犯邊罪得受戒耶答有犯不共波羅夷捨戒轉成男子者得問如捨戒還俗者無相續義罪亦應滅答三義異其轉根者一僧尼雖異皆是具足修道人二是業非心表無背道為惡三以根變故更無自成作義故隨變罪滅捨戒反此所以不例第五違行法解作不者七羯磨治人是但使不同犯僧尼互轉未治不須治已治不問調未調不須更作法設若調竟已去亦不須解以不同故更無起義唯有遮不至白衣家者不同罪雖滅而治法不亡以對俗故若比丘於同犯中得法竟變為尼者即於尼中順行調伏者尼為解之問若爾此同犯眾何不更與作法答此法當部各自得作具辨長短故不須更作於彼行已尼為解之何以不同順行者解云懺僧殘中奪三十五事敬奉清淨比丘八事失夜行法是難故不得在彼行更須作法此違行是易故此得彼行問尼變根罪滅舉法謝者何以懺罪竟舉法不亡答變根罪滅但任運滅非作法滅懺悔作法滅故舉法在問若爾我解大界衣界應在答解却大界衣界無解處故要須相依又舉時不藉前罪罪雖滅謝舉法猶在第六結界成不者十誦問一切比丘結界羯磨時僧都轉成女人界名比丘界名比丘尼界耶佛言名比丘尼界一切尼僧結界轉根反前問若比丘結界羯磨時有轉者有不轉者是界為僧為尼耶佛言說羯磨人成男屬比丘成女屬尼問比丘結界羯磨時說羯磨比丘獨成女界屬誰耶佛言名比丘尼反可解廣如彼文問所以結界地隨僧轉沙彌受戒僧變為尼得比丘戒者解云沙彌有情植男報業定僧有男女二業以業盡報轉沙彌業定故不隨眾轉界是非情又無定業故隨眾轉又界是有心自結受是有心為他故異問若爾比丘受持衣藥亦是無情又非業報亦應隨轉作尼受法答僧眾力彊又不偏牒名故隨僧轉衣鉢別人力弱又復別題名字僧尼不同故問羯磨法同結界本欲為僧雖復轉變猶故是僧是故眾變則成尼界羯磨欲竟以變為尼即成尼界者我說淨欲竟變者亦應即成尼家說淨答說淨變者反前可解如律所辨判界成者悉是臨羯磨欲竟時語若勢分未滿變皆不成第七衣藥資緣重作法不者若先受持說淨後雖互轉受及淨法皆不失如先結界竟後比丘等轉界猶屬本若本持衣說淨作此二法未成變者皆不成臨說竟時變者皆成善見云更須受持說淨者悉是未成此解非也結界我不得用故善見云若先受七日藥滿七日更作七日受一切請施主如常不失衣藥淨法皆失受持問前言同罪不得滅何以受衣說淨僧尼同不應受時失本法答由所對人別故失若爾大僧犯殘一眾懺尼悔二眾除牒所對人既別亦應得滅又解大僧三衣有一夜六夜別尼齊一夜大僧衣鉢齊開十日尼開不同一日十日別是故失又言但以稱名異故失將講破僧大意略存五門第一破僧體異者或就三寶說一或約凡聖說二或就位分三一外凡假名僧唯有威儀無有實德故名假名二內凡和合僧理解絕違故名和合三真實僧理解明白故名真實或就用說四今以要略就勝劣分二羯磨法輪有差別故此羯磨僧以無勝德可彰就迹名之其法輪有二一就緣說輪如來真教能詮輪行能生輪解故名為輪二就體解輪無漏空觀轉凡成聖故名為輪就四分律要取具於理事二和破方成逆業是僧故有事和是寶故有理和二和既壞法亦異故故伽論云捨八正而說餘道是輪壞一界之內二眾各別自恣羯磨是僧壞又依四分律亦有二和一行法輪謂佛四依由說五邪眾失同行名破行輪故四分云二事破僧妄語相似語若破眾法不以五法為能破若失解名破者五百比丘受化失解即是破僧何待伽耶是即破行也眾法輪者本是一和今分二別說戒羯磨名之為破故四分云二事破僧作羯磨取舍羅要經始終二方成破逆若就實言之行法是成僧因破法輪家法故名之為破無別法輪僧可破羯磨亦御眾之法及成僧因破羯磨僧家法故名為破非謂破羯磨僧上來皆就事辦破體論云非色非心為體今律家辨僧是假名攬四以成僧四外無別體指四人為體故四分云僧者四人過四人等第二解破法輪者問破法輪不過有三就何解破者指八正道以之為輪正語業命三是戒數為轂正見思惟二是慧數為輻正念定二是定數為輞正方便是精進數是轉輪者此四共成一能輾生死名輪今若指行為輪體者有三種一應得不得以解破二失解以解破問若爾我亦應將得以解和何故四分云和合者一羯磨乃至過四人等第二反難可解答前羯磨等者猶是望教明破得解者實是理和證理聖人名和合僧三相破以解破調達及四伴是能破五百是所破問若爾何故四分云伴黨者若四過助伴黨者乃至無數今將五百作所破者助伴黨者與律相違答若破行法五人是能破五百是所破問若爾何故得蘭答得自破蘭是第二以四分云懺悔違阿難諫故若破眾法時五百亦是能破以共他秉非法羯磨亦是所破以仍本名若就教法者本一今別故名為破破即有三一主破調達是二伴破四伴是三助破五百是此三人是能破僧是所破何者本未破僧時與佛一和之眾不名為破分作二部即是本一今別名之為破如鼻奈耶云調達當壞僧時正爾食時諸佛常法食時壞至暮還合又五分云調達十五日布薩時唱五法是五百人取籌唯阿難及須陀洹不取時身子目連大阿羅漢皆不在眾遂將五百人別布薩廣如彼解第三二破異者異便九種第一僧不同者羯磨亦通於尼法輪非俗俗無濫故道中唯具得法滿故問若準涅槃經云於閻浮提示現女身成佛眾人見皆言甚奇廣如彼經如何五分女人有五礙不得作帝釋魔王梵王輪王三界法王故不破法輪耶答今言不成釋迦一報男子成道假說過去亦如彼解又言女成佛者女人修道後成佛時即是男子果仍因名第二假佛異者破羯磨不假自稱為佛不秉羯磨故法輪僧要假一人自稱作佛佛握法輪故提婆亦有三十相稱以為佛故第三就數異者義如論說以實言之所破眾中亦有如來故是五人此彼各五故足十人而說九者佛不屬僧以言破僧故佛略之問若佛非僧攝者調達邪佛非是僧攝但應八人答如來佛寶體非虗謬故僧不攝調達自號體非佛故通收為九又解如來在眾一向不壞以威德故不可說故提婆若無破僧何得故不成例第四就界異者破羯磨僧要作法界內不通界外破法輪僧能破僧人須秉羯磨要在界內所破通外皆受邪化故又解同一界內即受邪外僧於界外來受邪化故通內外此中破眾法一向界內若破行法則通內外故王舍唱五法是提婆是佛乃至大千法輪不轉故知行法通界內外問不善地神唱五法是三千失解若善地神唱四諦得道亦應六天得解答善難惡易不應相涉問前言能破僧人要在界內者成破法輪須假羯磨但有破羯磨僧何得更有破法輪僧耶答雖假羯磨不假破羯磨僧故有二別何者若先不作羯磨不成反破如來眾法要破行眾二輪方成究竟故須羯磨第五二僧異者破羯磨僧世俗勝義二僧俱破聖人應有事亂破法輪僧唯破俗僧勝義僧識達邪正故此中雜心一解內凡已還名世俗僧自分不退他分勝進應得不得故名為破見諦已去名勝義僧自他共望不能破也問若內凡他分不得名破者何故經云我觀人天無破和合僧一解云經就已得上解論就未得上解經論互談故不相違一解凡教道有二一大乘祕密教經說無破者是二小乘現破示二教論說破者是又解煖頂二心名世俗僧自分不失他分可破忍心已上名勝義僧自他不壞依成實云乾慧已還名世俗僧自分不破生空已上自他不壞故彼論云凡夫輕躁故易可破若得世間空無我心尚不可破況無漏乎又解若望行法輪所破唯凡須忍受故眾法所破該通凡聖不以忍故就凡有二一定機者此時定聞法輪剋證聞思必不可壞二不定者謂設無邪勝緣是時應聞須證解正是調達所破問若破凡僧應得不得名破法輪僧者我殺那含金剛後心使不得羅漢應得殺羅漢罪答那含羅漢二俱可殺何須殺那含使不得羅漢以結勝殺羅漢逆以證解僧永不可破故就可得僧破令不得以結破輪逆一解今明破僧正障理解使不會聖故破凡結壞罪殺本是不障解雖殺那含金剛不障羅漢解又解三寶共頭有兼壞之義雖殺那含不兼羅漢亦復不共故不相成例又解金剛一念不可得壞假設言之問若爾供應聖凡望聖得福不答不得若爾勿得破聖罪答不同已得聖解不可破故就應得不得而論凡聖二僧皆可供故不須供凡以得聖福第六就方異異如論說第七就時異者羯磨通末代法輪在佛現六時不破亦如論說問六時中言前後者望破僧而作前後以無第二破故是昔解者八難佛前後應分二難者答今據破時望於前後彼望二佛共說中間第八就罪異者破羯磨僧犯輕偷蘭可懺非逆以正破正故唯破僧故破法輪僧偷蘭體重逆不可懺以邪破正故具壞三寶故問前調達破僧法輪障前入理解今結二罪不答此二相假若無僧者法輪不轉法輪不轉僧不得益然即斷法輪亦失理解故望斷法損僧合結一罪問調達破於別人不得理解而不望別人就僧總結者答據調達本心正欲破僧若得三人非本所期思心不暢不成逆罪破四已上思暢成逆又解若此四聞思不被他破攬成僧寶利益世間由破理解即無所攬不成僧寶益世之義是故損別望僧得罪問若破別就僧破結者我殺四別人亦應望僧總結答不例殺本命別故別結罪破本望心結亦由一法同時故罪有多少第九就報異者破羯磨僧墮阿鼻一劫受若破法輪僧受報如論第四破僧時處者調達初立邪三寶能破因成未即究竟故諸比丘白佛佛言汝莫破僧又如來依法略有二種一行依者四依八正是也二眾法者說戒羯磨是也今調達學佛亦說二依一立邪五法以為行法反破如來八正四依二立非法羯磨以為眾法反破如來正眾法故處所者以王舍忍可五法始破行法後至伽耶羯磨說戒反破眾法始是究竟破正義備故僧祇云調達向伽耶佛使阿難喚即語阿難我不去吾從今日後不共佛法僧事布薩自恣說戒等欲學不學自從我意阿難作是念此是害事出是惡聲將壞僧耶二反喚後六羣比丘自相謂言瞿曇沙門必當三喚我各正意先作羯磨馳譽後世即布薩竟及至三喚說戒已竟佛自聞之便說清淨如滿月頌等告阿難言非法眾已作布薩如法人自作布薩去以斯證故破在伽耶問調達得喚不喚盡集別亦不犯四伴同僧不犯逆罪不喚應犯別何得不犯答非罪重故便是不犯但一破已後邪正不相足數各作無妨故言不犯問調達行法與正既異眾法云何答眾法亦異故僧祇云調達欲破僧非前序已四夷乃至滅諍隨順法不制者制制者不制又復七羯磨開制不同道俗共行九部經等更作異句義味各異文辭自說誦習亦持教人既知眾法異云何羯磨異耶或可共作多白不作羯磨或作羯磨不作白或先羯磨後作白或單白說或文為增減顛倒首尾是名非法羯磨若諸比丘信受二法始是具足破正義備方成逆罪第五二逆偷蘭究竟最初者出血方便是規不暢故復是最初無逆教可違問出血之罪是制制殺人戒後輕重已顯云何無廣可違答殺佛偷蘭與凡不同一可懺不可懺別二逆非逆異故得最初非第二也問逆不逆異別有初者即殺凡重罪非逆殺父重罪是逆亦逆不逆異應殺父逆業別有最初答不同殺凡及父雖有逆不逆同不可懺故無別初殺佛方便二異如上故大智論云多聞持戒九清淨人方能破僧為此義故若第二者便不清淨何能破僧問調達出血偷蘭是初可爾豈不犯逆若便犯逆何故言淨答言清淨者望制罪無違說為清淨非望違理惡行如俗人鴦掘殺人滿千後出家猶名清淨問若爾外道殺父母佛言滅擯者答非第二人須滅擯此殺父母違理惡行重故滅擯首解云五逆之罪犯即無初若無初者云何出佛身血後始破僧故名清淨答於滅擯教無違故言清淨問若爾遣彼四人至六十四人方便豈非第二云何言淨答我言淨者不犯初篇重罪名淨非持五篇不犯名為清淨亦可調達犯偷蘭及以行逆得入羯磨僧數名持戒故得破僧若於制罪有違反前可解問提婆既言作佛犯重何成破僧耶答但言我當作佛故不犯問若爾當時非佛何得破耶又依伽論解稱佛犯蘭有二義不重一世間一佛更無第二二具三十二相八十種好異於世人無人信受故輕而非重問若先出血何故婆沙云造餘無間不得破僧者答謂未受戒前可造四逆不得破僧以受戒不得體非比丘故不成破又解餘無間者就三逆罪非謂出血何者三逆即有波羅夷名違教重極故不能破若違行重教輕者得蘭即十誦云九清淨人能破而四分云出血破僧前故知望滅擯教無違破僧偷蘭是究竟非方便所規得暢更無進故又復過狀顯彰佛自訶責破僧罪重泥黎一劫因果盡明違教造罪故知第二故善見云破僧無最初以違佛諫故若無諫者即有初明也首解五逆猶無初於偷蘭為第二故就言第二者得罪同他第二非謂調達前已有人破僧調達為第二問漏過未起云何逆制罪名答過全未起聖人不得立制然已秉五法行化於時聖何不違問若調達違諫破僧是第二者違諫僧殘亦訶言汝若不捨更犯重罪亦應是第二答佛訶調達因果具彰罪名是定僧諫之中罪名通含於輕重不表因果故非第二又解破僧是所諫之事諫時諫破僧作時作破僧故知破僧是第二問比丘犯五逆幾有最初答破僧一逆無別最初餘四廣前犯者皆有最初以無廣教可違故問同是逆罪何故有無不同答破僧倚傍須設諫違教而作是第二餘四不爾今言有初者犯違教罪不論行逆問俗人犯逆有初不答俗犯無初所以知爾欲明俗人欲希出家已興逆害業障尤重無剋道益故是第二以四分云外道滅擯故知無初問若爾俗人無初不得出家者何故菩薩阿逸多犯三逆罪佛聽受具即是有初何得言無答猶自無初但值佛勝緣望諸比丘是業障不得度之遂焚燒僧坊故知無初將講時非時略存四門第一定立時非時者時有二種一五利佛賞比丘授五利故名為時二安居勞時如毗蘭若請僧安居為是而施名為時衣除此已外名曰非時如四分云現前僧大得可分物留過安居佛言不應留此是非時衣現前僧分故知不為勞故名為非時第二現僧各二者時中有二何者施主為安居故現前數人施名時現前如四分云僧得安居衣破為二部佛言數人多少是施主布施該通一化內作安居者是僧皆得故名時僧得如律云若比丘安居大得僧安居衣彼比丘應作念口言受是也非時有二者施表別人有限者名非時現前如四分云現前僧大得可分衣物佛言聽分應數人多少乃至好惡相參等分若施主普同時該十方分通一化名非時僧得如律云有住處現前僧大得可分衣時有客比丘數數來分衣疲極佛言應差一人令白二羯磨分就一部如此其二部者於上四處類加可解第三作法異者有二現前不作法四種定故一時二處三人四法此四皆定以施主局限人物定故但數人墮籌分如四分云物已分竟乃至應使不見擲籌是也若準一人如律云歡喜受已有客比丘來不與分首解界內一人領物故作歡喜受分之名此是初緣未開三語受法故二種僧得中竝須作法四不定故但二部僧得一向隨人多少物等已當部各自須作法分又解時僧得不須作法前安居人直爾攝取留至非時復須作法首解此二中後義為定其初解者時僧得若就時勞位定應不作法但以施主心普該一化安居竟者及法皆得故須作法如四分一比丘大得僧夏衣佛言心念口言此是我物若已受者餘比丘來不與分解云受者受持餘不及法故不得分問不及法故不得分者何故律云應相待囑授取耶答有三義開待囑取一元是施物界內人二身同受施三取安居勞去分者成以作法成故去者有三義故開待等問若爾外界人亦有安居亦得相待囑取不答闕他二義不言相待而有勞義故及法得問若外安居人及法得者何故律云不應此處夏安居餘處受衣答此對時現前施言之今解意者四種定故不須作法而說應心念口言此是我物者謂安居時僧得施各各界內四人已上直爾攝取此施物人非僧故須心念作法又解此物既是僧得施亦不須心念三語受直是興念攝物屬己便定律云若受者就興念也第四位例差別者斯有二例一檀越施二亡比丘物初中有二謂現前及僧得現前有二時及非時各有一部二部僧得亦二謂時非時各有三別一當住處二者界得如善見論十五種界是三此僧得此中二門各有一部二部一部中一人二三人四人五人已上法皆各別今且就略而論有籌分有羯磨分此中墮籌分者引文如上首解若二人已上得墮籌分唯有一人歡喜受之五分亦言若受持若淨施若與人不爾餘來應分羯磨分者應引文亦如上也首解法應有三差別一差分衣人文云差一比丘故二付衣法文云僧今持與某甲彼當與僧故三被差人作白二法分文云持衣與一比丘令白二羯磨分故此前後二法律略不序行者應具又解文中白二者是付法亦即分法云僧今與某甲比丘彼當與僧故知即攝付分二法若此付即是分法者此羯磨非受衣人作故文云持衣與一比丘令白二分此令分者是誰作故知不爾又解同前又須二法律云應差一人令分白二羯磨昔人傳律不詳由前墮籌難了故令作法今由此現前僧得作二別人受法如別處時僧得者如律云有比丘未分夏衣便去後比丘分夏衣彼比丘行還問言夏衣分未答言已分問言取我衣分不答言不取彼比丘訶責餘比丘言我在此安居而不取我衣分佛言成分衣應相待亦應囑授後人受夏衣分此中首解安居時僧得施主聽分四方安居者有其分佛開得物界內前安居人直爾攝取不須作法然此比丘出行不在僧界內盡集攝取故成分衣彼比丘既在此前安居理應合攝故言應待等囑授取準此可解若未攝身死不言分與入僧以未定屬故若是現前嚫利物要索分與若死亦應計人分一分入僧以定屬故分衣如是食即不爾故四分云食隨施心不應分二時現前者如律云比丘在異住處結夏安居已復於餘住處彼不知當於何住處取安居物佛言聽住日多處應取若二處等聽各取半此中首解施主為夏安居故數人各與二衣故言取半十誦云若二處安居日多處與物若日等者自恣處與若二處自恣先自恣處與非時現前如四分云王舍城諸優婆塞聞聽諸比丘畜檀越施衣即送種種好衣與諸比丘諸比丘不知云何往白如來如來言聽分不知如何分佛言當數人多少若十人為十分廣說可解若論邪正二部者如律云諸比丘大得可分衣物僧破為二部佛言應分為二分若未得可分衣物僧破為二部佛言應問檀越當與誰若言與某甲上座即應隨彼語上座所在處與若彼言不知若言俱與應分作二分乃至諸比丘得可分衣物有比丘從此部往彼部彼不應與分若未得衣物有比丘從此部往彼部不應與首解出界外好比丘尚無有分況邪僧乎又可同住一界亦不得分次言亡人物者五人已上分次第二法一者看病賞勞二四人作羯磨施一人一人還僧若四人者昔解亦得作羯磨施一人一人還僧所為付比丘亦墮四人僧故今解所為人不得足數四人止得作羯磨分不得展轉母論云五人共住一人亡四人作羯磨分之是名四相應法五人羯磨分比丘物四人羯磨施一人一人還施僧然後分之是名五相應法義言具五方言展轉施故知五人已上得作二法其一二三相應法例可解五百問又言五人已上得羯磨分四人已下不得羯磨分祇律云四人共住一人死者三人應作是說諸長老某甲比丘無常具稱有物現前應分此處無僧我等現前應得義云唯一人作法二人不作一說即得不言至三四分不言互作亦不言一人作然依祇律好何以不同對首說戒自恣者彼須各各說己行淨故不同十誦更互相說又十誦云僧打犍槌僧和合分物已起若有界內比丘來別眾分衣得成佛言欲與者與不得強分義言不知用羯磨以不四分云別眾分衣不成分吉羅若有比丘作無想分不成分無犯若無比丘作有想分衣得成而得吉羅將講四波羅夷略以七門第一毒業成犯者婬戒以利己患故因三事起貪心故成善生言若為樂行非梵行是名從貪而境交內順暢思事決是故貪成癡心非順瞋是相違故不能成殺盜二戒患通損益以三事起三事成廣如善生及論中解又僧祇云摩摩帝互用僧物者是名癡心起成不須曲引大妄語戒利己為故因貪癡起亦貪癡成希名利故不以瞋成不同小妄亦以瞋成設有處說三事起成通論輕重三毒既爾別論業者初三身犯後一口犯麤分如此以細言之婬戒事設形交非身不就故身心成犯口無犯義殺盜二戒自作教人彼此俱辨故身口皆成身本口末何者口言雖了要假前人身業斷命離處教人成重故問口不獨成殺盜者云何口業呪物過關及以殺得成罪可須身助答凡一切呪法皆令鬼神夜叉以其身業扶物過關及以斷命非不假身助故問若爾云何師子吼殺獸壯夫咄殺人何以鬼神身業助乎答此亦由身壯聲大深河道淺殺人等類類此可解此中依多雜二論三業不互造業性別故事不竟故言章了了未得成重要假身故人解三業互造經論不同不可通和成實許互身口互作義如上解如和利經云外道神仙起一瞋心即滅那羅陀國此是意造身業僧布薩時得默妄罪是意造口業問意得造身口二業者何故不許身口作意業答意是根本故得作身口身口是末故不得作意妄言一戒欲顯己得聖希招名利非言不宣口業獨成亦有身業現相成重身表口業故從根本判互口業若論三業本末互造始終無妨第二自作教他不同者婬戒自作成重非教人也樂在前人故殺盜二戒患通損益自作教人損境暢思又齊故彼吾同犯大妄語戒自不以言教人稱聖於己無潤但得輕罪此中論自他始終不同者自他有三一自造他二他造自三自造自婬戒三犯盜戒盜他重餘二無罪問若爾何故四分云盜得己衣得偷蘭者答此望境差不約損自自施不成此亦如是殺戒自殺他他殺自可解自殺自者如十誦云自殺無罪善見亦爾何者善生云不起他想無瞋心故若依五分結前方便命斷偷蘭故順正亦然今四分意不立進趣自殺無罪命斷無戒然即自殺夷蘭竝無但得殺業不善道問若爾何故調部自殺犯偷蘭答此次方便自殺不成戒存故致偷蘭縱立進趣何咎不應難言自打自謗自覆等亦無犯者戒猶存故妄三可解論始終者初戒入即犯不待得樂殺即據終要待命斷盜妄約中財雖離地猶未得用妄雖言了未得名利故第三錯誤剋漫之義者此中錯誤皆是不當殊謬之位略論異者錯就現緣境差為義誤約不現緣境差心謬為義錯誤既分須配四戒婬戒勿問錯誤患起內情但使正道不問知不知此彼男女人非人畜雖心緣此謂彼誤亦成犯雖境多交涉錯亦成犯盜戒言之若心漫無寄凡非己物皆是盜境勿問三趣境有差殊心有謬妄皆稱本心故錯誤竝犯若心剋定要取人物不盜餘趣剋心取者是其盜境餘者即非及至造境境有交涉心有迷謬雖舉離處不成入己由本主不稱所期心境既非何過之有故錯之與誤斯皆不犯若用此物得前偷蘭物體無罪後知便還不者犯重語殺而言若漫心無局三趣俱害勿問錯誤皆得成犯若剋心害人不殺餘趣若為害心所緣是其殺境及至造趣契會相應斷命成犯若非本期即非殺境及至造趣事會心有迷謬非畜雖死不稱所期又無殺心故錯誤不犯若就人言之錯即無犯誤即成犯何者且緣王張解若望後人雖非木期以心不了緣此謂彼勿不皆有緣人之心誤亦成犯以緣具故不如盜戒故勒伽云殺母而殺非母殺非母而殺母羅漢凡夫母父外人竝偷蘭遮人非人亦復如是問若誤重錯輕者何故五分云欲殺彼而誤殺此生疑佛言偷蘭答此錯境為誤祇律疏云錯殺犯誤不犯即彼律云多人相逐行欲殺前人而誤傷中後無犯故知境交名誤心緣此謂彼為錯故不應難論其妄語異趣言之錯犯誤不犯漫心無簡錯誤俱犯以詐顯道德欺誑前人表己得聖損境事成己得潤故錯誤俱犯十誦云欲說初果錯說三四亦犯善見云錯說三四禪等皆犯問妄語言了即得其罪不開錯誤者我盜物離處即結其罪應無錯誤答盜本自有損主離處故有錯誤妄語言了即是虗解故無錯誤錯誤既分今論剋漫者婬戒犯無剋心初期在此而後會彼男女張王人畜一切盡犯殺盜二戒有剋成犯餘境不犯人解殺盜亦有作剋不成剋者如欲害怨命欲壞怨財而此人共多人竝坐共多人財一處同室放火燒時知有餘人及財不剋俱燒者是前言成剋者對境界可分者言之妄語剋心罪有犯不犯犯謂心境相當不犯者謂心境不相稱設令竝坐言欲誑東人西人聞亦無有犯以於西人無誑心故首解若三趣俱現內心知有犯無剋心於餘境亦犯若三趣不竝有剋心成犯於餘境不犯廣如別章第四須知本制之興何以立四者論聖制之興為防患源謂貪瞋癡對於貪愛以制前二對於瞋癡當分立一為斯差別故因制四問瞋癡各一貪獨制二者何答貪心雖一而境殊內外故立二戒所瞋之境雖二但得罪不等癡慢誑境局在有心不通非情故局一也故四分阿難答孔問制增上戒學為調貪欲瞋癡令盡故故知為三問戒能防非不除性結何故對此以制戒答指論對治戒防麤非定伏細亂慧翦性結但以慧不孤起必依於定定生有源功由淨戒就本以表故言戒除問已知四對三制未識尼八對何位立答尼雖八種前四是本不異此說後四是末離於本故故不別對又如盜戒中說佛告頻婆王云何名本罪王言若故斷命偷至五錢婬他婦女自為己身於本眾中故作妄語若犯此四是名不活佛言我今亦為諸比丘制於四重準此言之餘三略無無別所以婆多問言此戒何故獨依國法餘三不也答有二一因盜王材故須依王法餘三不因王起二此戒國法有異或盜多財得死罪或盜少財得死罪多少不定今盜王材故問王法婬殺二戒事成即罪成相是定故不問國法妄語國不治罰故亦不問準大集文依王法立於四戒同盜戒文善見問佛云一切智三世諸佛結戒輕重世尊悉知何以方便問大臣答不問共論一錢結重世人譏嫌比丘持戒功德無量猶如虗空大地不可度量云何如來以一錢結重如來用智慧籌量令禁戒久住令人信受心伏故此中首解若近而言之佛依於王若遠而言之王依於佛制何者諸婆羅門等抄撮過去諸佛經律禁制分齊安置己典用為國師為王立法治國化人故知依佛第五戒先後次第論對治者愛法喜為故初犯婬乃至第四弄失長衣妄語等類可以準知故善見云佛成道二十年始制婬戒僧祇云佛成道五年冬第五半月十二日中後一人半影為邪舍制初戒等六年冬分第二半月十日東向坐食後二人半影制此戒六年冬分第三半月九日食前西向坐一人半影為眾多病比丘因鹿杖外道制此戒六年冬分第四半月十三日食後三人半影東向坐制此戒問同是出家沙彌初戒與僧異者答沙彌前五猶是俗戒後五更加又俗人福分自妻不障斷婬即可非全分故故殺在初以全斷故若爾沙彌智分應婬在初以全斷故答但以人同方便竝是少分故不同例又年幼小婬惱未發小多無慈故殺在初婬為後制制意既爾須論對治者婬戒離染淨行盜戒少欲知足殺戒慈悲憐愍妄語實對治等第六沙彌任運者如善生云八戒中若先遣信欲刑戮人信遲未至其人去後發心受齋時信至即殺雖復一時以戒力故不得殺罪此既得戒無有殺罪故知無任運犯問若以戒力故不得殺罪者何故即善生云有諸貴人常敕作惡若欲受齋先敕語遮先諸惡乃得成就若先不遮徑受齋者不得名齋答此諸貴人自在常教敕殺義同惡律儀人以作惡是強而復時長此處受齋者雖是善法時短弱故為可障故不得齋前是暫作惡短弱故雖復不遮得齋故不得竝問若惡律儀不善前成強而時長障八齋不成者我受形俱戒者亦善律儀前成強而時長何故生大邪見時即為他所遮而失戒邪答前惡勝時長八齋弱短故障戒不起今大邪見是斷善根相違故失戒以邪勝善劣故若得形俱戒後雖受惡律儀必不失戒非斷善根故然論唯言四種捨不言受惡戒時捨此雖作惡乃可犯戒不名失戒若成實論及善生言受惡戒時即失善戒不同雜心婆多云受惡戒時善戒皆互捨也首解不見經論有任運犯今以義求準律說似有任運犯何者是耶先教人作殺等已不遮不悔惡果種成受具已後果就得罪此中婬戒無教人同犯故無任運犯若沙彌時教人殺盜及稱已得聖已進受具戒竟信成三事教者三性之心任運犯三重以無作生故若論自作不善性有善無記無前後自業相成亦通三性若受戒未竟所教事成即邊罪故不得戒若受戒欲竟教事亦成罪戒俱得以善惡二因勢分相資俱各成故第七略解四戒者昔解就婬戒以準聖教意五戒中但制他妻八戒俱制自他唯限日夜唯於大戒乃制自妻亦盡形壽何者他妻五戒已制故略不說此論二難者梵難正是恐犯戒事故於夷殘二犯不開以梵難體合護戒故其命難者恐與命作難故於初夷中開作前事以怨逼但通心故律云不受樂無犯是也其盜戒中雖無正文就義有開但令於他物上無損為護命梵故暫移東西義應不犯若逼令燒等即無開也若有自護命梵而不得殺他是故不開妄言亦然五百問云不自為己故而作妄語通別二開義如別處又婆多問云盜五成重為何等錢答曰論解不定或解金銀銅鐵錢佛依王舍法結戒其王舍本隨以何錢諸有佛法處準以五錢為限名重未詳王舍用何錢故言各不定又解隨國土所用一切有佛法處即以彼錢為五錢量用有不同故言各不定又解本依王舍法盜五錢得死罪而制此戒故限五錢王舍既爾自餘國法隨盜即入死錢之多少皆犯此戒故言各不定首解雖有三解觀律師意後解為定又十誦盜五錢者古大銅錢得重罪若盜小錢八十文隨其盜處所用小錢之義經論本自不定行亦難知成罪之時宜就於寬護戒之時乃至艸葉不得盜取既知輕重不定理宜急護又誦云盜天北方人物偷蘭彼於此物無我所心故伽論又云三天下人重以此錢斷鼻奈邪云師子殘下直五錢得重乃至鷹雞殘取者皆重今四分無盜非人物文諸師云云義在別處又婆論云舉物離地還著本處得一罪即持去得二罪一得業道罪以盜他物故二波羅夷以佛結戒故解云準此論就於一境逆重二義定別不同問設若盜戒中有主無主想無盜心不犯者何故殺戒得有非人想乎答無主想謂糞掃衣非生罪緣人非人想能生罪緣故不相例問若爾不處分作處分想非生非緣何故不同於盜戒答此不可學彼即可學故問若爾地非地想亦不可學事何故得吉又解此作轉想得前心小罪問若本迷人作非人想殺人死邊無罪起想當非人邊有心無境但得吉羅者何故律云非人想殺得偷蘭耶答據根本作人想殺破威儀往時已得偷蘭臨對人所轉作非人想殺若結後心轉想之罪應得吉羅律隱後心罪結前心蘭問臨對人所轉作非人想若後心無偷蘭者何故律云非人想偷蘭耶答轉想當非人時實無偷蘭由轉想當非人故前心偷蘭不得攬因成果者由轉想結前心蘭此是律此戒既爾一切戒皆然問殺父母為知得逆不知得逆答本漫心情無所簡若對父母心雖不知稱四事者先見羊作漫心殺雖羊去父母等代處作羊想而殺得逆重若本剋心不殺父母父母雖死而不知是但得波羅夷罪不得逆罪問若父母出家成羅漢得二逆不答十誦云得成夷罪并二逆又涅槃云一殺父王二殺須陀洹罪兼二重如斷命時即損恩養亦損福田二境既別心緣兩害得二逆波羅夷理即顯也五分唯得一罪何者福恩雖異是一行者既無二命何得二罪直以逆名表此波羅夷業重故言波羅夷并逆無別二逆問父變為尼殺得逆罪者我亦打此尼得打比丘罪不答但犯打尼問若爾應得殺尼之罪如打故也答打時位是女人故結打尼罪殺本就違恩而結逆罪不就於位問若父善業盡變成畜生若殺此畜亦有違恩得殺逆不答不例父變為女根雖有異同是人趣故望父得逆畜生與人趣既不同報亦應異故犯殺畜提若始變少分亦應得夷若通身變者一向不可殺但得境強蘭但以知通變本作沙彌與死若暫自變非畜生若知變作猶得夷逆以死時是父非餘境壞故不知無逆此中首解謗法重故不入五逆如五逆不入四重義如智論又解謗法重者謂大乘教故若破小法唯犯逆罪即前破法輪是也問若爾此逆者何故律云毀呰修多羅毗曇犯吉答前言逆者謂是破滅誹謗故今言吉者直是毀呰故所以無違問若殺人得重殺畜得提者何故十誦云墮人胎不得重墮畜胎犯耶答即彼律解初是人懷畜生胎後是畜生懷人胎殺化人者偷蘭問殺佛不知是佛不得逆者供養佛不知是佛不應佛邊得福耶答供養本漫心一切生福處皆作供養之意雖佛作神想由本無心簡別故望佛邊得福若本剋心正供養樹神意若對佛作樹神想供養望佛邊無福殺供俱有漫剋二心不得將漫心供養難剋心殺問首解聖人有二實語一身證實除虗妄說稱實二想實理觀方便聞波水聲如目連等未知佛亦有不答佛唯有身證實語何故一聲聞知境不盡二入定即知出即不了故有想實語如來不爾其凡夫人亦有事中身證想心實語然非理解故皆不能斷虗誑之心後時違心背想遂成妄語妄語雖多不出五種波羅夷僧殘偷蘭波逸提吉羅總判為二波羅夷偷蘭同以出世法誑他得罪然誑人損重或於非天損輕過淺故有輕重餘三妄語同以世法誑於人也重輕成三準義可解若細論者自有說聖而得輕罪自有說凡而犯重罪廣如十誦此中初二妄語雖有四句要心境俱虗有犯餘三妄語勿問境之虗實但使心虗皆成妄問妄語本為誑人生信今結罪之時不待生信知便結罪答知信細止得從知後生信不得從信後生知故不待信問若爾如勸受偏心男子食豈可受相難知何言了即結耶答彼以繫他謗俗故言了即結首解凡口造口家業言章了了前人即知壞境義備何待於信如口造身家業勸足食汎教他受偏心男子食殺盜等雖言章了了前境未壞不得結重問此之一戒安置自言引虗餘三戒本不著何意昔解此一罪重有壞眾義須僧治罰不著自言眾即不知不得治罰綱網不立今著反前餘三種自行中除不假眾罰亦無壞眾之義如覆他重罪僧輕尼重著不著異問若爾初篇三戒二篇十一壞眾義同何以不著答計義應爾但結集家就相隱難知重著輕略如大妄小妄大覆小覆大謗小謗皆重著輕略非無此義首解自言有二一問自言二不問自言初通諸戒後前解是然夷中當時有故即序戒本自餘提中當時無故戒本不存如漏失戒當時有夢即開戒本初戒理有但當時無遂闕戒本此亦如是問若爾文云若問者是問自言當時既無何以序耶答據通諸戒實不須序但對不問自言故須之耳若不序者時人見有不問自言故謂不須問自言是故對序餘無所對故因問自言亦不序也祇律云六年制此戒婆論云八年興羯磨廣如別章
